networks:
  app-tier:
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.1.1
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_SERVERS: zookeeper:2888:3888
    networks:
      - app-tier
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.1.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka:9092,LISTENER_DOCKER_EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_DOCKER_INTERNAL:PLAINTEXT,LISTENER_DOCKER_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_DOCKER_INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # ── Throughput tuning for high-volume Yellow producer ──────────────────
      # Allow larger socket buffers so the broker can absorb burst writes
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      # Flush less frequently to disk — reduces I/O bottleneck
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 50000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 2000
      # Increase max message and fetch sizes
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_REPLICA_FETCH_MAX_BYTES: 5242880
      # Num I/O and network threads — helps under sustained load
      KAFKA_NUM_IO_THREADS: 4
      KAFKA_NUM_NETWORK_THREADS: 4
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - app-tier
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:13
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taxidb
    ports:
      - "5432:5432"
    networks:
      - app-tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taxidb"]
      interval: 10s
      timeout: 5s
      retries: 5
